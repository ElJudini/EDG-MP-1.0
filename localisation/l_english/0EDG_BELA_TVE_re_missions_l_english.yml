 EDG_ers_accepte_tartar_tooltip_yes:0 "£yes£如果我们通过接纳鞑靼人来完成该任务"
 EDG_ers_accepte_tartar_tooltip_no:0 "£no£如果我们通过接纳鞑靼人来完成该任务"
